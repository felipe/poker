<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poker Hand Advisor</title>
<meta name="description" content="Play or fold — and learn why.">

<!-- Social preview (iMessage / Slack / X / LinkedIn / GitHub).
     iMessage and Slack honor Open Graph; X reads the twitter:* duplicates.
     The image URL is absolute (and points at raw.githubusercontent.com so
     it's stable wherever the site is deployed) — many scrapers require
     absolute URLs for og:image and fail silently on relative paths. -->
<meta property="og:type" content="website">
<meta property="og:title" content="Poker Hand Advisor">
<meta property="og:description" content="Play or fold — and learn why.">
<meta property="og:image" content="https://raw.githubusercontent.com/felipe/poker/main/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Poker Hand Advisor">
<meta name="twitter:description" content="Play or fold — and learn why.">
<meta name="twitter:image" content="https://raw.githubusercontent.com/felipe/poker/main/og.png">

<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/base.css">
<script>
  // Apply saved theme before first paint to avoid a flash. Built-in themes
  // (dark/felt/light) just set data-theme; designer themes are stylesheets
  // loaded from themes/<slug>.css. This script must come AFTER the base
  // stylesheet links so the appended <link> sits later in the cascade and
  // its rules win over the base.
  (function () {
    var CUSTOM = ["vegas-neon", "classic-casino", "classic-burgundy", "brutalist", "brutalist-dark", "editorial"];
    try {
      var t = localStorage.getItem("theme") || "brutalist";
      if (CUSTOM.indexOf(t) >= 0) {
        var l = document.createElement("link");
        l.rel = "stylesheet"; l.id = "theme-css"; l.href = "themes/" + t + ".css";
        document.head.appendChild(l);
      } else {
        document.documentElement.dataset.theme = t;
      }
    } catch (_) {
      // Storage blocked — fall back to dark (built-in, no link load needed).
      document.documentElement.dataset.theme = "dark";
    }
  })();
</script>
</head>
<body>

<h1>Poker Hand Advisor</h1>
<p class="sub">Pick a variant and player count, deal your hand, then call play or fold.<br>
After you decide, the app runs 10,000 simulated hands and tells you if you were right.</p>

<div class="panel">
  <div class="game-header">
    <div class="game-name" id="gameName">Texas Hold'em</div>
    <div class="game-meta" id="gameMeta">5 players</div>
  </div>

  <div id="cards" class="cards"></div>
  <div id="board" class="cards board hidden"></div>

  <button id="deal" class="btn-primary">Deal</button>
  <div id="prompt" class="prompt"></div>
  <div class="actions" id="callActions" style="display:none">
    <button id="play" class="btn-play">Play</button>
    <button id="fold" class="btn-fold">Fold</button>
  </div>

  <div id="status" class="status"></div>

  <div id="result" class="result hidden">
    <div class="result-row">
      <span class="result-label">Your win %</span>
      <span class="result-val" id="winPct">—</span>
    </div>
    <div class="result-row">
      <span class="result-label" id="thresholdLabel">Fair share</span>
      <span class="result-val" id="threshold">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">Verdict</span>
      <span class="result-val verdict" id="verdict">—</span>
    </div>
    <div id="feedback" class="feedback"></div>
    <div id="explanation" class="explanation"></div>
    <div id="trajectory" class="trajectory"></div>
    <div id="breakdown" class="breakdown"></div>
  </div>

  <div class="settings-section">
    <div class="settings-bar">
      <button id="settingsToggle" class="icon-btn settings-toggle" type="button" aria-label="Settings" aria-expanded="false" aria-controls="settingsPanel">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <span class="suit-emblem" aria-hidden="true"><span class="s-b">♠</span><span class="s-r">♥</span><span class="s-r">♦</span><span class="s-b">♣</span></span>
      <a class="icon-btn github-link" href="https://github.com/felipe/poker" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-1.17-.02-2.12-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.12 3.05.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.4-5.25 5.69.41.35.78 1.05.78 2.11 0 1.52-.01 2.74-.01 3.11 0 .3.2.66.79.55C20.21 21.38 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/>
        </svg>
      </a>
    </div>
    <div id="settingsPanel" class="settings-panel hidden">
      <label>
        <span>Variant</span>
        <select id="variant">
          <option value="holdem" selected>Texas Hold'em</option>
          <option value="fivecard">5-Card Draw</option>
          <option value="sevenstud">7-Card Stud</option>
        </select>
      </label>
      <label>
        <span>Players (total)</span>
        <select id="players">
          <option>2</option><option>3</option><option>4</option>
          <option value="5" selected>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </label>
      <label>
        <span>Theme</span>
        <select id="theme">
          <optgroup label="Built-in">
            <option value="dark">Dark</option>
            <option value="felt">Felt</option>
            <option value="light">Light</option>
          </optgroup>
          <optgroup label="Designs">
            <option value="vegas-neon">Vegas Neon</option>
            <option value="classic-casino">Classic Casino</option>
            <option value="classic-burgundy">Classic Burgundy</option>
            <option value="brutalist">Brutalist</option>
            <option value="brutalist-dark">Brutalist Dark</option>
            <option value="editorial">Editorial</option>
          </optgroup>
        </select>
      </label>
      <label>
        <span>Reveal remaining cards on fold</span>
        <input type="checkbox" id="revealOnFold">
      </label>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
