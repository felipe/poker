<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poker Hand Advisor</title>
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/base.css">
<script>
  // Apply saved theme before first paint to avoid a flash. Built-in themes
  // (dark/felt/light) just set data-theme; designer themes are stylesheets
  // loaded from themes/<slug>.css. This script must come AFTER the base
  // stylesheet links so the appended <link> sits later in the cascade and
  // its rules win over the base.
  (function () {
    var CUSTOM = ["vegas-neon", "classic-casino", "classic-burgundy", "brutalist", "brutalist-dark", "editorial"];
    try {
      var t = localStorage.getItem("theme") || "brutalist";
      if (CUSTOM.indexOf(t) >= 0) {
        var l = document.createElement("link");
        l.rel = "stylesheet"; l.id = "theme-css"; l.href = "themes/" + t + ".css";
        document.head.appendChild(l);
      } else {
        document.documentElement.dataset.theme = t;
      }
    } catch (_) {
      // Storage blocked — fall back to dark (built-in, no link load needed).
      document.documentElement.dataset.theme = "dark";
    }
  })();
</script>
</head>
<body>

<h1>Poker Hand Advisor</h1>
<p class="sub">Pick a variant and player count, deal your hand, then call play or fold.<br>
After you decide, the app runs 10,000 simulated hands and tells you if you were right.</p>

<div class="panel">
  <div class="game-header">
    <div class="game-name" id="gameName">Texas Hold'em</div>
    <div class="game-meta" id="gameMeta">5 players</div>
  </div>

  <div id="cards" class="cards"></div>
  <div id="board" class="cards board hidden"></div>

  <button id="deal" class="btn-primary">Deal</button>
  <div class="actions" id="callActions" style="display:none">
    <button id="play" class="btn-play">Play</button>
    <button id="fold" class="btn-fold">Fold</button>
  </div>

  <div id="status" class="status"></div>

  <div id="result" class="result hidden">
    <div class="result-row">
      <span class="result-label">Your win %</span>
      <span class="result-val" id="winPct">—</span>
    </div>
    <div class="result-row">
      <span class="result-label" id="thresholdLabel">Fair share</span>
      <span class="result-val" id="threshold">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">Verdict</span>
      <span class="result-val verdict" id="verdict">—</span>
    </div>
    <div id="feedback" class="feedback"></div>
    <div id="trajectory" class="trajectory"></div>
    <div id="breakdown" class="breakdown"></div>
  </div>

  <div class="settings-section">
    <button id="settingsToggle" class="settings-toggle" type="button" aria-expanded="false" aria-controls="settingsPanel">Settings</button>
    <div id="settingsPanel" class="settings-panel hidden">
      <label>
        <span>Variant</span>
        <select id="variant">
          <option value="holdem" selected>Texas Hold'em</option>
          <option value="fivecard">5-Card Draw</option>
          <option value="sevenstud">7-Card Stud</option>
        </select>
      </label>
      <label>
        <span>Players (total)</span>
        <select id="players">
          <option>2</option><option>3</option><option>4</option>
          <option value="5" selected>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </label>
      <label>
        <span>Theme</span>
        <select id="theme">
          <optgroup label="Built-in">
            <option value="dark">Dark</option>
            <option value="felt">Felt</option>
            <option value="light">Light</option>
          </optgroup>
          <optgroup label="Designs">
            <option value="vegas-neon">Vegas Neon</option>
            <option value="classic-casino">Classic Casino</option>
            <option value="classic-burgundy">Classic Burgundy</option>
            <option value="brutalist">Brutalist</option>
            <option value="brutalist-dark">Brutalist Dark</option>
            <option value="editorial">Editorial</option>
          </optgroup>
        </select>
      </label>
      <label>
        <span>Reveal remaining cards on fold</span>
        <input type="checkbox" id="revealOnFold">
      </label>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
