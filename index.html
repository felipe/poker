<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poker Hand Advisor</title>
<style>
  :root,
  [data-theme="dark"] {
    --bg: #0e1a14;
    --panel: #16271e;
    --ink: #e8f0ea;
    --muted: #94a59b;
    --accent: #ffd166;
    --good: #4ade80;
    --bad: #f87171;
    --card-bg: #fafafa;
    --card-black: #1a1a1a;
    --card-red: #c0392b;
    --border: #2a3f33;
    --input-bg: #0e1a14;
    --track: #1f3327;
    --result-bg: #0e1a14;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }
  [data-theme="felt"] {
    --bg: #07392a;
    --panel: #0a5238;
    --ink: #f5efe0;
    --muted: #a8c8b3;
    --accent: #ffd166;
    --good: #6ee7a3;
    --bad: #fca5a5;
    --card-bg: #fafafa;
    --card-black: #1a1a1a;
    --card-red: #c0392b;
    --border: #1a5a40;
    --input-bg: #07392a;
    --track: #134a32;
    --result-bg: #07392a;
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
  }
  [data-theme="light"] {
    --bg: #f3f4f6;
    --panel: #ffffff;
    --ink: #111827;
    --muted: #6b7280;
    --accent: #d97706;
    --good: #15803d;
    --bad: #dc2626;
    --card-bg: #ffffff;
    --card-black: #1a1a1a;
    --card-red: #c0392b;
    --border: #d1d5db;
    --input-bg: #f9fafb;
    --track: #e5e7eb;
    --result-bg: #f9fafb;
    --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { margin: 0 0 4px; font-size: 1.6rem; }
  .sub { color: var(--muted); margin-bottom: 24px; font-size: 0.95rem; text-align: center; }
  body.in-hand h1, body.in-hand .sub { display: none; }
  body.in-hand #deal { display: none; }
  .panel {
    background: var(--panel);
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 560px;
    box-shadow: var(--shadow);
  }
  /* Game header — canonical (Dark). Themes override below or in themes/*.css. */
  .game-header {
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 14px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .game-header::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 1px;
    background: var(--accent);
  }
  .game-name {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.05;
  }
  .game-meta {
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Felt — gold pinstripe under the name, gold caps for meta. */
  [data-theme="felt"] .game-header { border-bottom-color: rgba(255, 209, 102, 0.22); }
  [data-theme="felt"] .game-header::after {
    background: linear-gradient(90deg, transparent, var(--accent) 35%, var(--accent) 65%, transparent);
    width: 96px;
  }
  [data-theme="felt"] .game-name { letter-spacing: 0; }
  [data-theme="felt"] .game-meta { color: var(--accent); opacity: 0.75; }

  /* Light — restrained, slimmer weight, tighter accent rule. */
  [data-theme="light"] .game-header { border-bottom-color: rgba(0, 0, 0, 0.08); }
  [data-theme="light"] .game-header::after { width: 20px; }
  [data-theme="light"] .game-name { font-weight: 600; letter-spacing: -0.02em; }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  select, button {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--ink);
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
  }
  button {
    border: none;
    font-weight: 600;
    transition: transform 0.05s, opacity 0.15s;
  }
  button:hover:not(:disabled) { opacity: 0.9; }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #1a1a1a; }
  .btn-play { background: var(--good); color: #0a1f10; }
  .btn-fold { background: var(--bad); color: #2a0a0a; }
  .actions { display: flex; gap: 10px; margin-top: 12px; }
  .actions button { flex: 1; }

  .cards {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 140px;
    margin: 20px 0;
  }
  .card-row {
    display: flex;
    justify-content: center;
    gap: 16px;
  }
  .board { margin-top: 4px; min-height: 0; }
  .board::before {
    content: "Board";
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .board.hidden { display: none; }
  .card {
    width: 88px;
    height: 124px;
    background: var(--card-bg);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8px;
    font-weight: 700;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  .card.red { color: var(--card-red); }
  .card.black { color: var(--card-black); }
  .card .top { font-size: 1.5rem; line-height: 1; }
  .card .mid { font-size: 2.4rem; text-align: center; line-height: 1; }
  .card .bot { font-size: 1.5rem; text-align: left; line-height: 1; transform: rotate(180deg); }
  .card.placeholder {
    background: transparent;
    border: 2px dashed var(--border);
    box-shadow: none;
  }

  .result {
    margin-top: 16px;
    padding: 16px;
    border-radius: 8px;
    background: var(--result-bg);
    border: 1px solid var(--border);
  }
  .result.hidden { display: none; }
  .result-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--track);
  }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: var(--muted); }
  .result-val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .verdict { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.05em; }
  .verdict.play { color: var(--good); }
  .verdict.fold { color: var(--bad); }
  .feedback {
    margin-top: 10px;
    text-align: center;
    font-weight: 600;
  }
  .status { color: var(--muted); margin-top: 12px; font-size: 0.9rem; text-align: center; min-height: 1.2em; }
  .status .math-note { color: var(--ink); margin-bottom: 4px; }
  .status .verdict { font-size: 0.9rem; letter-spacing: 0.04em; font-weight: 700; }

  /* Shrink cards on narrow viewports so the 7-card (4+3) layout fits. */
  @media (max-width: 440px) {
    .card { width: 60px; height: 84px; padding: 5px; border-radius: 6px; }
    .card .top, .card .bot { font-size: 1rem; }
    .card .mid { font-size: 1.6rem; }
    .card-row { gap: 8px; }
    .cards { gap: 8px; min-height: 100px; }
  }

  .breakdown { margin-top: 14px; }
  .breakdown:empty { display: none; }
  .breakdown-title {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 52px;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 0.9rem;
  }
  .bar-name { color: var(--ink); }
  .bar-track {
    display: block;
    height: 8px;
    background: var(--track);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    display: block;
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
  }
  .bar-pct { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }

  .trajectory { margin-top: 14px; }
  .trajectory:empty { display: none; }
  .trajectory-title {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .trajectory svg { width: 100%; height: auto; display: block; }
  .trajectory .grid { stroke: var(--track); stroke-width: 1; }
  .trajectory .grid-label { fill: var(--muted); font-size: 10px; text-anchor: end; font-variant-numeric: tabular-nums; }
  .trajectory .threshold { stroke: var(--muted); stroke-width: 1; stroke-dasharray: 4 3; }
  .trajectory .threshold-label { fill: var(--muted); font-size: 10px; text-anchor: end; }
  .trajectory .line { stroke: var(--accent); stroke-width: 2; fill: none; }
  .trajectory .point { fill: var(--accent); }
  .trajectory .point-label { fill: var(--ink); font-size: 11px; font-weight: 600; text-anchor: middle; font-variant-numeric: tabular-nums; }
  .trajectory .street-label { fill: var(--muted); font-size: 11px; text-anchor: middle; }

  .verdict.tossup { color: var(--accent); }

  .settings-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    text-align: center;
  }
  .settings-toggle {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px 8px;
    width: auto;
    letter-spacing: 0.04em;
  }
  .settings-toggle:hover { color: var(--ink); }
  .settings-toggle::before { content: "⚙ "; }
  .settings-panel {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
  }
  .settings-panel.hidden { display: none; }
  .settings-panel label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
  }
  .settings-panel input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .settings-panel select {
    width: auto;
    padding: 4px 8px;
    font-size: 0.9rem;
  }
</style>
<script>
  // Apply saved theme before first paint to avoid a flash. Built-in themes
  // (dark/felt/light) just set data-theme; custom designs are stylesheets
  // loaded from themes/<slug>.css. This script must come AFTER the inline
  // <style> so the appended <link> sits later in the cascade and its rules
  // win over the inline base.
  (function () {
    var CUSTOM = ["vegas-neon", "classic-casino", "classic-burgundy", "brutalist", "editorial"];
    try {
      var t = localStorage.getItem("theme") || "dark";
      if (CUSTOM.indexOf(t) >= 0) {
        var l = document.createElement("link");
        l.rel = "stylesheet"; l.id = "theme-css"; l.href = "themes/" + t + ".css";
        document.head.appendChild(l);
      } else {
        document.documentElement.dataset.theme = t;
      }
    } catch (_) { document.documentElement.dataset.theme = "dark"; }
  })();
</script>
</head>
<body>

<h1>Poker Hand Advisor</h1>
<p class="sub">Pick a variant and player count, deal your hand, then call play or fold.<br>
After you decide, the app runs 10,000 simulated hands and tells you if you were right.</p>

<div class="panel">
  <div class="game-header">
    <div class="game-name" id="gameName">Texas Hold'em</div>
    <div class="game-meta" id="gameMeta">5 players</div>
  </div>

  <div id="cards" class="cards"></div>
  <div id="board" class="cards board hidden"></div>

  <button id="deal" class="btn-primary">Deal</button>
  <div class="actions" id="callActions" style="display:none">
    <button id="play" class="btn-play">Play</button>
    <button id="fold" class="btn-fold">Fold</button>
  </div>

  <div id="status" class="status"></div>

  <div id="result" class="result hidden">
    <div class="result-row">
      <span class="result-label">Your win %</span>
      <span class="result-val" id="winPct">—</span>
    </div>
    <div class="result-row">
      <span class="result-label" id="thresholdLabel">Fair share</span>
      <span class="result-val" id="threshold">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">Verdict</span>
      <span class="result-val verdict" id="verdict">—</span>
    </div>
    <div id="feedback" class="feedback"></div>
    <div id="trajectory" class="trajectory"></div>
    <div id="breakdown" class="breakdown"></div>
  </div>

  <div class="settings-section">
    <button id="settingsToggle" class="settings-toggle" type="button" aria-expanded="false">Settings</button>
    <div id="settingsPanel" class="settings-panel hidden">
      <label>
        <span>Variant</span>
        <select id="variant">
          <option value="holdem" selected>Texas Hold'em</option>
          <option value="fivecard">5-Card Draw</option>
          <option value="sevenstud">7-Card Stud</option>
        </select>
      </label>
      <label>
        <span>Players (total)</span>
        <select id="players">
          <option>2</option><option>3</option><option>4</option>
          <option value="5" selected>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </label>
      <label>
        <span>Theme</span>
        <select id="theme">
          <optgroup label="Built-in">
            <option value="dark">Dark</option>
            <option value="felt">Felt</option>
            <option value="light">Light</option>
          </optgroup>
          <optgroup label="Designs">
            <option value="vegas-neon">Vegas Neon</option>
            <option value="classic-casino">Classic Casino</option>
            <option value="classic-burgundy">Classic Burgundy</option>
            <option value="brutalist">Brutalist</option>
            <option value="editorial">Editorial</option>
          </optgroup>
        </select>
      </label>
      <label>
        <span>Reveal remaining cards on fold</span>
        <input type="checkbox" id="revealOnFold">
      </label>
    </div>
  </div>
</div>

<script>
"use strict";

// ---------- cards ----------
const SUITS = ["s", "h", "d", "c"];
const SUIT_GLYPH = { s: "♠", h: "♥", d: "♦", c: "♣" };
const SUIT_COLOR = { s: "black", c: "black", h: "red", d: "red" };
const RANK_GLYPH = { 11: "J", 12: "Q", 13: "K", 14: "A" };
const rankToStr = r => RANK_GLYPH[r] || String(r);

function makeDeck() {
  const d = [];
  for (let r = 2; r <= 14; r++)
    for (let s = 0; s < 4; s++)
      d.push({ rank: r, suit: s });
  return d;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

// ---------- hand evaluator ----------
// Score = category * 10^10 + 5 kickers (2 digits each, ranks 2..14).
// Higher score wins. Accepts 5..7 cards.
function evaluate(cards) {
  const rankCount = new Array(15).fill(0);
  const suitCount = new Array(4).fill(0);
  const bySuit = [[], [], [], []];
  for (const c of cards) {
    rankCount[c.rank]++;
    suitCount[c.suit]++;
    bySuit[c.suit].push(c.rank);
  }

  // Flush
  let flushSuit = -1;
  for (let s = 0; s < 4; s++) if (suitCount[s] >= 5) flushSuit = s;

  // Straight: highest top-rank of 5 consecutive
  function highestStraight(rankSet) {
    // rankSet: array of unique ranks present (booleans indexed 2..14)
    // Ace can also be low (treat as 1) — check 5-high straight separately.
    for (let top = 14; top >= 5; top--) {
      if (rankSet[top] && rankSet[top-1] && rankSet[top-2] && rankSet[top-3] && rankSet[top-4]) {
        return top;
      }
    }
    // wheel: A-2-3-4-5
    if (rankSet[14] && rankSet[2] && rankSet[3] && rankSet[4] && rankSet[5]) return 5;
    return 0;
  }

  const presentSet = new Array(15).fill(false);
  for (let r = 2; r <= 14; r++) presentSet[r] = rankCount[r] > 0;
  const straightTop = highestStraight(presentSet);

  // Straight flush
  let sfTop = 0;
  if (flushSuit >= 0) {
    const flushSet = new Array(15).fill(false);
    for (const r of bySuit[flushSuit]) flushSet[r] = true;
    sfTop = highestStraight(flushSet);
  }

  // Group ranks by count
  const fours = [], threes = [], pairs = [], singles = [];
  for (let r = 14; r >= 2; r--) {
    if (rankCount[r] === 4) fours.push(r);
    else if (rankCount[r] === 3) threes.push(r);
    else if (rankCount[r] === 2) pairs.push(r);
    else if (rankCount[r] === 1) singles.push(r);
  }

  function pack(category, kickers) {
    // category: 0..8, kickers: array of up to 5 ranks (2..14)
    const k = kickers.slice(0, 5);
    while (k.length < 5) k.push(0);
    let n = category;
    for (const v of k) n = n * 100 + v;
    return n;
  }

  // Straight flush
  if (sfTop) return pack(8, [sfTop]);
  // Four of a kind
  if (fours.length) {
    const four = fours[0];
    let kicker = 0;
    for (let r = 14; r >= 2; r--) if (r !== four && rankCount[r] > 0) { kicker = r; break; }
    return pack(7, [four, kicker]);
  }
  // Full house: top trip + best pair (or second trip)
  if (threes.length && (threes.length >= 2 || pairs.length)) {
    const trip = threes[0];
    const pairRank = threes[1] !== undefined ? threes[1] : pairs[0];
    return pack(6, [trip, pairRank]);
  }
  // Flush
  if (flushSuit >= 0) {
    const flushRanks = bySuit[flushSuit].slice().sort((a, b) => b - a).slice(0, 5);
    return pack(5, flushRanks);
  }
  // Straight
  if (straightTop) return pack(4, [straightTop]);
  // Three of a kind
  if (threes.length) {
    const trip = threes[0];
    const kickers = [];
    for (let r = 14; r >= 2 && kickers.length < 2; r--)
      if (r !== trip && rankCount[r] > 0) kickers.push(r);
    return pack(3, [trip, ...kickers]);
  }
  // Two pair
  if (pairs.length >= 2) {
    const [p1, p2] = pairs;
    let kicker = 0;
    for (let r = 14; r >= 2; r--) if (r !== p1 && r !== p2 && rankCount[r] > 0) { kicker = r; break; }
    return pack(2, [p1, p2, kicker]);
  }
  // One pair
  if (pairs.length === 1) {
    const p = pairs[0];
    const kickers = [];
    for (let r = 14; r >= 2 && kickers.length < 3; r--)
      if (r !== p && rankCount[r] > 0) kickers.push(r);
    return pack(1, [p, ...kickers]);
  }
  // High card
  const highs = [];
  for (let r = 14; r >= 2 && highs.length < 5; r--)
    if (rankCount[r] > 0) highs.push(r);
  return pack(0, highs);
}

// ---------- variants ----------
const VARIANTS = {
  holdem: {
    name: "Texas Hold'em", hole: 2, board: 5,
    streets: [
      { label: "Pre-flop", foldText: "pre-flop",    user: 2, board: 0 },
      { label: "Flop",     foldText: "on the flop", user: 2, board: 3 },
      { label: "Turn",     foldText: "on the turn", user: 2, board: 4 },
      { label: "River",    foldText: "on the river",user: 2, board: 5 },
    ],
  },
  fivecard: {
    name: "5-Card Draw", hole: 5, board: 0,
    streets: [ { label: "Hand", foldText: "", user: 5, board: 0 } ],
  },
  sevenstud: {
    name: "7-Card Stud", hole: 7, board: 0,
    streets: [
      { label: "3rd street", foldText: "on 3rd street", user: 3, board: 0 },
      { label: "4th street", foldText: "on 4th street", user: 4, board: 0 },
      { label: "5th street", foldText: "on 5th street", user: 5, board: 0 },
      { label: "6th street", foldText: "on 6th street", user: 6, board: 0 },
      { label: "7th street", foldText: "on 7th street", user: 7, board: 0 },
    ],
  },
};

// ---------- monte carlo ----------
const CATEGORY_DIVISOR = 100 ** 5; // matches pack() encoding

function simulate(userRevealed, boardRevealed, numOpponents, variant, iterations) {
  const v = VARIANTS[variant];
  const used = new Set();
  for (const c of userRevealed) used.add(c.rank * 4 + c.suit);
  for (const c of boardRevealed) used.add(c.rank * 4 + c.suit);
  const remaining = makeDeck().filter(c => !used.has(c.rank * 4 + c.suit));

  const userExtra = v.hole - userRevealed.length;
  const boardExtra = v.board - boardRevealed.length;
  const oppCards = v.hole;
  const cardsNeeded = userExtra + boardExtra + numOpponents * oppCards;

  let wins = 0;
  const distribution = new Array(9).fill(0);

  for (let iter = 0; iter < iterations; iter++) {
    for (let i = 0; i < cardsNeeded; i++) {
      const j = i + ((Math.random() * (remaining.length - i)) | 0);
      const t = remaining[i]; remaining[i] = remaining[j]; remaining[j] = t;
    }

    let ptr = 0;
    const userMore = remaining.slice(ptr, ptr + userExtra); ptr += userExtra;
    const boardMore = remaining.slice(ptr, ptr + boardExtra); ptr += boardExtra;
    const fullBoard = boardRevealed.concat(boardMore);
    const userHand = userRevealed.concat(userMore).concat(fullBoard);
    const userScore = evaluate(userHand);
    distribution[Math.floor(userScore / CATEGORY_DIVISOR)]++;

    let winners = 1;
    let beaten = false;
    for (let o = 0; o < numOpponents; o++) {
      const opp = remaining.slice(ptr + o * oppCards, ptr + (o + 1) * oppCards);
      const oppScore = evaluate(opp.concat(fullBoard));
      if (oppScore > userScore) { beaten = true; break; }
      if (oppScore === userScore) winners++;
    }
    if (!beaten) wins += 1 / winners;
  }
  return {
    winRate: wins / iterations,
    distribution: distribution.map(c => c / iterations),
  };
}

const CATEGORY_NAMES = [
  "High card", "One pair", "Two pair", "Three of a kind", "Straight",
  "Flush", "Full house", "Four of a kind", "Straight flush",
];

// ---------- UI ----------
const cardsEl = document.getElementById("cards");
const boardEl = document.getElementById("board");
const dealBtn = document.getElementById("deal");
const playBtn = document.getElementById("play");
const foldBtn = document.getElementById("fold");
const callActions = document.getElementById("callActions");
const variantSel = document.getElementById("variant");
const playersSel = document.getElementById("players");
const revealOnFoldEl = document.getElementById("revealOnFold");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const winPctEl = document.getElementById("winPct");
const thresholdEl = document.getElementById("threshold");
const verdictEl = document.getElementById("verdict");
const feedbackEl = document.getElementById("feedback");
const breakdownEl = document.getElementById("breakdown");
const trajectoryEl = document.getElementById("trajectory");
const gameNameEl = document.getElementById("gameName");
const gameMetaEl = document.getElementById("gameMeta");
const thresholdLabelEl = document.getElementById("thresholdLabel");

// Equity within this band of the fair-share threshold counts as a TOSS-UP —
// either decision is reasonable, so we don't second-guess the user.
const TOSSUP_BAND = 0.01; // ±1 percentage point

// Hand-in-progress state
let deck = [];
let cursor = 0;
let streetIdx = 0;
let userRevealed = [];
let boardRevealed = [];
let resultsVisible = false;
let handInProgress = false;
// Snapshots of every street the user actually saw, captured right after the
// cards are dealt. Used to compute the equity-by-street chart at hand's end.
let streetHistory = [];

// Row layout per total card count, so the cards keep their shape
// instead of squashing onto a single line.
const ROW_LAYOUTS = { 2: [2], 3: [3], 4: [4], 5: [3, 2], 6: [3, 3], 7: [4, 3] };
function rowLayout(n) { return ROW_LAYOUTS[n] || [n]; }

function currentVariant() { return VARIANTS[variantSel.value]; }
function currentStreet() { return currentVariant().streets[streetIdx]; }
function isFinalStreet() { return streetIdx === currentVariant().streets.length - 1; }

function renderGameHeader() {
  const n = parseInt(playersSel.value, 10);
  gameNameEl.textContent = currentVariant().name;
  gameMetaEl.textContent = `${n} ${n === 1 ? "player" : "players"}`;
}

function renderCardsInto(target, cards, placeholderCount) {
  target.innerHTML = "";
  const empty = cards.length === 0;
  const count = empty ? placeholderCount : cards.length;
  if (count === 0) return;
  const layout = rowLayout(count);
  let idx = 0;
  for (const rowSize of layout) {
    const row = document.createElement("div");
    row.className = "card-row";
    for (let i = 0; i < rowSize; i++) {
      if (empty) {
        const ph = document.createElement("div");
        ph.className = "card placeholder";
        row.appendChild(ph);
      } else {
        const c = cards[idx++];
        const div = document.createElement("div");
        div.className = "card " + SUIT_COLOR[SUITS[c.suit]];
        const r = rankToStr(c.rank);
        const s = SUIT_GLYPH[SUITS[c.suit]];
        div.innerHTML = `<div class="top">${r}${s}</div><div class="mid">${s}</div><div class="bot">${r}${s}</div>`;
        row.appendChild(div);
      }
    }
    target.appendChild(row);
  }
}

function renderHand() {
  const v = currentVariant();
  const firstUser = v.streets[0].user;
  renderCardsInto(cardsEl, userRevealed, firstUser);
  renderCardsInto(boardEl, boardRevealed, 0);
  if (boardRevealed.length > 0) boardEl.classList.remove("hidden");
  else boardEl.classList.add("hidden");
}

function maxPlayersForVariant(key) {
  const v = VARIANTS[key];
  // Cards available for opponents after removing user's hole cards and the board.
  // Each opponent takes `v.hole` cards. Cap at 10 (the UI maximum).
  const maxOpponents = Math.floor((52 - v.hole - v.board) / v.hole);
  return Math.min(10, 1 + maxOpponents);
}

function applyPlayerCap() {
  const max = maxPlayersForVariant(variantSel.value);
  for (const opt of playersSel.options) {
    const v = parseInt(opt.value || opt.text, 10);
    opt.disabled = v > max;
  }
  if (parseInt(playersSel.value, 10) > max) {
    playersSel.value = String(max);
  }
}

function reset() {
  deck = [];
  cursor = 0;
  streetIdx = 0;
  userRevealed = [];
  boardRevealed = [];
  streetHistory = [];
  resultsVisible = false;
  handInProgress = false;
  renderHand();
  resultEl.classList.add("hidden");
  callActions.style.display = "none";
  statusEl.textContent = "";
  feedbackEl.textContent = "";
  feedbackEl.className = "feedback";
  breakdownEl.innerHTML = "";
  trajectoryEl.innerHTML = "";
  dealBtn.disabled = false;
  dealBtn.textContent = "Deal";
  variantSel.disabled = false;
  playersSel.disabled = false;
  document.body.classList.remove("in-hand");
  applyPlayerCap();
  renderGameHeader();
}

function dealStreet(idx) {
  const s = currentVariant().streets[idx];
  const targetUser = s.user;
  const targetBoard = s.board;
  while (userRevealed.length < targetUser) {
    userRevealed.push(deck[cursor++]);
  }
  while (boardRevealed.length < targetBoard) {
    boardRevealed.push(deck[cursor++]);
  }
}

// Capture the cards visible at the current street so we can show how the
// user's equity evolved over the streets they actually played.
function snapshotStreet() {
  streetHistory.push({
    label: currentStreet().label,
    user: userRevealed.slice(),
    board: boardRevealed.slice(),
  });
}

function advanceStreet() {
  streetIdx++;
  dealStreet(streetIdx);
  snapshotStreet();
}

function revealRemaining() {
  const last = currentVariant().streets.length - 1;
  while (streetIdx < last) {
    streetIdx++;
    dealStreet(streetIdx);
  }
}

function deal() {
  deck = shuffle(makeDeck());
  cursor = 0;
  streetIdx = 0;
  userRevealed = [];
  boardRevealed = [];
  streetHistory = [];
  handInProgress = true;
  resultsVisible = false;
  dealStreet(0);
  snapshotStreet();
  document.body.classList.add("in-hand");
  renderHand();
  resultEl.classList.add("hidden");
  feedbackEl.textContent = "";
  feedbackEl.className = "feedback";
  breakdownEl.innerHTML = "";
  trajectoryEl.innerHTML = "";
  dealBtn.disabled = true;
  dealBtn.textContent = "Deal";
  promptDecision();
}

function promptDecision() {
  statusEl.textContent = `${currentStreet().label} — play or fold?`;
  callActions.style.display = "flex";
}

async function handleCall(userChoice) {
  callActions.style.display = "none";

  if (userChoice === "fold") {
    const foldText = currentStreet().foldText;
    const summary = foldText ? `You folded ${foldText}.` : "You folded.";
    // Sim at the fold state — equity reflects the decision the user just made,
    // not what they'd have ended up with after the rest of the runout.
    await runSimulationAndRender();
    if (revealOnFoldEl.checked) {
      revealRemaining();
      renderHand();
    }
    endHand(summary);
    return;
  }

  // play
  if (isFinalStreet()) {
    await runSimulationAndRender();
    endHand("Showdown — hand complete.");
    return;
  }

  // Mid-hand play: sim the current street so the user can see whether they
  // played with or against the math before the next street is dealt.
  // Snapshot inputs and lock the variant/player selectors BEFORE the await —
  // otherwise a variant change during the yield triggers reset(), then this
  // handler resumes and advanceStreet() runs against the new variant
  // (potentially single-street), corrupting state or crashing.
  const playedStreet = currentStreet();
  const variantKey = variantSel.value;
  const userSnap = userRevealed.slice();
  const boardSnap = boardRevealed.slice();
  const numPlayers = parseInt(playersSel.value, 10);
  const threshold = 1 / numPlayers;
  variantSel.disabled = true;
  playersSel.disabled = true;
  statusEl.textContent = "Simulating…";
  await new Promise(r => setTimeout(r, 20));
  // Defense in depth: if anything still managed to reset the hand during the
  // yield, bail before touching street state.
  if (!handInProgress) {
    variantSel.disabled = false;
    playersSel.disabled = false;
    return;
  }
  const { winRate } = simulate(userSnap, boardSnap, numPlayers - 1, variantKey, 10000);
  const verdict = Math.abs(winRate - threshold) <= TOSSUP_BAND
    ? { text: "TOSS-UP", cls: "tossup" }
    : winRate > threshold
      ? { text: "PLAY", cls: "play" }
      : { text: "FOLD", cls: "fold" };

  advanceStreet();
  renderHand();
  statusEl.innerHTML =
    `<div class="math-note">${playedStreet.label}: math said ` +
    `<span class="verdict ${verdict.cls}">${verdict.text}</span></div>` +
    `<div>${currentStreet().label} — play or fold?</div>`;
  variantSel.disabled = false;
  playersSel.disabled = false;
  callActions.style.display = "flex";
}

function endHand(summary) {
  handInProgress = false;
  callActions.style.display = "none";
  document.body.classList.remove("in-hand");
  dealBtn.disabled = false;
  dealBtn.textContent = "Deal again";
  variantSel.disabled = false;
  playersSel.disabled = false;
  statusEl.textContent = "Click Deal again for another hand.";
  feedbackEl.textContent = summary;
  feedbackEl.className = "feedback";
}

async function runSimulationAndRender() {
  // Snapshot inputs before yielding so anything during the await can't
  // change the simulation's effective parameters.
  const numPlayers = parseInt(playersSel.value, 10);
  const numOpponents = numPlayers - 1;
  const variant = variantSel.value;
  const history = streetHistory.slice();
  const threshold = 1 / numPlayers;

  // Lock all controls BEFORE the yield so resets/deals/variant changes
  // can't race against the in-flight simulation.
  variantSel.disabled = true;
  playersSel.disabled = true;
  dealBtn.disabled = true;

  statusEl.textContent = "Simulating…";
  await new Promise(r => setTimeout(r, 20));

  // One sim per street the user saw — the last is the terminal state used
  // for the headline verdict and breakdown, the rest power the equity chart.
  const trajectory = history.map(snap => {
    const res = simulate(snap.user, snap.board, numOpponents, variant, 10000);
    return { label: snap.label, user: snap.user, board: snap.board, ...res };
  });
  const final = trajectory[trajectory.length - 1];
  const winRate = final.winRate;

  let verdictText, verdictClass;
  if (Math.abs(winRate - threshold) <= TOSSUP_BAND) {
    verdictText = "TOSS-UP";
    verdictClass = "tossup";
  } else if (winRate > threshold) {
    verdictText = "PLAY";
    verdictClass = "play";
  } else {
    verdictText = "FOLD";
    verdictClass = "fold";
  }

  winPctEl.textContent = (winRate * 100).toFixed(1) + "%";
  thresholdEl.textContent = (threshold * 100).toFixed(1) + "%";
  thresholdLabelEl.textContent = `Fair share (1 of ${numPlayers})`;
  verdictEl.textContent = verdictText;
  verdictEl.className = "result-val verdict " + verdictClass;
  renderBreakdown(final.distribution, variant, final.user, final.board);
  renderTrajectory(trajectory, threshold);
  resultEl.classList.remove("hidden");
  resultsVisible = true;

  // Clear "Simulating…". If the hand is already wrapped up (player-count
  // change after a fold/showdown), restore the deal-again prompt; otherwise
  // endHand() will write the final message right after this returns.
  statusEl.textContent = handInProgress ? "" : "Click Deal again for another hand.";

  // Re-open controls. Variant change clears everything via reset();
  // player-count change re-runs the sim against the resolved hand state.
  // Deal stays disabled while a hand is in progress so a stray click can't
  // silently abandon the hand mid-street; endHand() re-enables it.
  playersSel.disabled = false;
  variantSel.disabled = false;
  dealBtn.disabled = handInProgress;
}

function renderTrajectory(trajectory, threshold) {
  // A single point isn't a trajectory — no chart to draw.
  if (trajectory.length < 2) {
    trajectoryEl.innerHTML = "";
    return;
  }

  const W = 400, H = 180;
  const padL = 40, padR = 16, padT = 22, padB = 32;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const y = v => padT + innerH * (1 - v);
  const x = i => padL + i * innerW / (trajectory.length - 1);

  const parts = [`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`];

  for (let v = 0; v <= 1.0001; v += 0.25) {
    const yv = y(v);
    parts.push(`<line class="grid" x1="${padL}" x2="${W - padR}" y1="${yv}" y2="${yv}"/>`);
    parts.push(`<text class="grid-label" x="${padL - 6}" y="${yv + 4}">${Math.round(v * 100)}%</text>`);
  }

  const tY = y(threshold);
  parts.push(`<line class="threshold" x1="${padL}" x2="${W - padR}" y1="${tY}" y2="${tY}"/>`);
  parts.push(`<text class="threshold-label" x="${W - padR}" y="${tY - 4}">fair share</text>`);

  const pathD = trajectory.map((t, i) => `${i === 0 ? "M" : "L"}${x(i)},${y(t.winRate)}`).join(" ");
  parts.push(`<path class="line" d="${pathD}"/>`);

  trajectory.forEach((t, i) => {
    const px = x(i), py = y(t.winRate);
    parts.push(`<circle class="point" cx="${px}" cy="${py}" r="4"/>`);
    parts.push(`<text class="point-label" x="${px}" y="${py - 8}">${(t.winRate * 100).toFixed(0)}%</text>`);
    parts.push(`<text class="street-label" x="${px}" y="${H - 10}">${t.label}</text>`);
  });

  parts.push(`</svg>`);
  trajectoryEl.innerHTML = `<div class="trajectory-title">Equity by street</div>${parts.join("")}`;
}

function renderBreakdown(distribution, variant, userAtSim, boardAtSim) {
  const v = VARIANTS[variant];
  // Locked = the user's final hand is fully known at sim time, so the
  // distribution collapses to a single category (their actual hand).
  const locked = userAtSim.length >= v.hole && boardAtSim.length >= v.board;
  const title = locked ? "Your hand" : "Hands you'll likely make";
  const ordered = distribution
    .map((p, i) => ({ p, i }))
    .filter(x => x.p >= 0.005)
    .sort((a, b) => b.p - a.p);
  const rows = ordered.map(({ p, i }) => {
    const pct = (p * 100).toFixed(p >= 0.1 ? 0 : 1) + "%";
    const w = Math.max(p * 100, 2);
    return `<div class="bar-row">
      <span class="bar-name">${CATEGORY_NAMES[i]}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${w}%"></span></span>
      <span class="bar-pct">${pct}</span>
    </div>`;
  });
  breakdownEl.innerHTML = `<div class="breakdown-title">${title}</div>${rows.join("")}`;
}

dealBtn.addEventListener("click", deal);
playBtn.addEventListener("click", () => handleCall("play"));
foldBtn.addEventListener("click", () => handleCall("fold"));
variantSel.addEventListener("change", reset);
playersSel.addEventListener("change", () => {
  renderGameHeader();
  if (resultsVisible) runSimulationAndRender();
});

// ---------- settings ----------
const settingsToggleEl = document.getElementById("settingsToggle");
const settingsPanelEl = document.getElementById("settingsPanel");
const themeSel = document.getElementById("theme");

settingsToggleEl.addEventListener("click", () => {
  const open = settingsPanelEl.classList.toggle("hidden") === false;
  settingsToggleEl.setAttribute("aria-expanded", String(open));
});

const CUSTOM_THEMES = ["vegas-neon", "classic-casino", "classic-burgundy", "brutalist", "editorial"];

function applyTheme(slug) {
  let link = document.getElementById("theme-css");
  if (CUSTOM_THEMES.indexOf(slug) >= 0) {
    if (!link) {
      link = document.createElement("link");
      link.rel = "stylesheet";
      link.id = "theme-css";
      document.head.appendChild(link);
    }
    link.href = `themes/${slug}.css`;
    document.documentElement.removeAttribute("data-theme");
  } else {
    if (link) link.remove();
    document.documentElement.dataset.theme = slug;
  }
  try { localStorage.setItem("theme", slug); } catch (_) {}
}

themeSel.value = localStorage.getItem("theme") || "dark";
themeSel.addEventListener("change", () => applyTheme(themeSel.value));

reset();
</script>
</body>
</html>
